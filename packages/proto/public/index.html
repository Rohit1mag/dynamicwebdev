<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Investment Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/reset.css" />
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/page.css" />
  <link rel="stylesheet" href="/styles/layout.css" />
</head>
<body>
  <auth-provider>
    <itr-header></itr-header>

    <div class="page-shell">
      <aside class="sidebar" aria-label="Quick links">
        <p class="sidebar__title">Jump to</p>
        <ul class="sidebar__list">
          <li><a href="#investors">Investors</a></li>
          <li><a href="#portfolios">Portfolios</a></li>
          <li><a href="#assets">Assets</a></li>
          <li><a href="#markets">Markets</a></li>
          <li><a href="#returns">Returns</a></li>
          <li><a href="#risks">Risks</a></li>
        </ul>
      </aside>

      <div class="page-shell__main">
        <main class="content content--home">
          <p class="lede">This site has links for investors, portfolios, assets, markets, returns, and risks. Pick a card below or use the sidebar.</p>

          <itr-home-directory src="/data/sections.json"></itr-home-directory>
        </main>
      </div>
    </div>
  </auth-provider>

  <script type="importmap">
    {
      "imports": {
        "@unbndl/auth": "https://unpkg.com/@unbndl/auth",
        "@unbndl/html": "https://unpkg.com/@unbndl/html@1.0.2/dist/html.js",
        "@unbndl/view": "https://unpkg.com/@unbndl/view"
      }
    }
  </script>
  <script type="module">
    import { define } from "@unbndl/html";
    import { Auth } from "@unbndl/auth";
    import { ItrHeaderElement } from "/js/header.js";
    import { HomeSectionElement } from "/js/home-section.js";
    import { HomeDirectoryElement } from "/js/home-directory.js";

    define({
      "auth-provider": Auth.Provider,
      "itr-header": ItrHeaderElement,
      "itr-home-section": HomeSectionElement,
      "itr-home-directory": HomeDirectoryElement,
    });
  </script>
  <script type="module" src="/scripts/darkmode.js"></script>
</body>
</html>
